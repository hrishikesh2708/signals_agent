services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signals
      POSTGRES_PASSWORD: signals
      POSTGRES_DB: signals
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signals -d signals"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://signals:signals@postgres:5432/signals
    ports:
      - "8000:8000"
    volumes:
      - ./server/app:/app/server/app
    command: >
      sh -c "uv run alembic upgrade head &&
      exec uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
      --reload --reload-dir app"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health'')"',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build: ./client
    env_file: .env
    environment:
      BACKEND_URL: http://server:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - ./client/next.config.ts:/app/next.config.ts
      - ./client/tsconfig.json:/app/tsconfig.json
      - ./client/postcss.config.mjs:/app/postcss.config.mjs
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0"]
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
