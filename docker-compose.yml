# Skeleton only — services may not build until FastAPI / Next.js are implemented.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signals
      POSTGRES_PASSWORD: signals
      POSTGRES_DB: signals
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  client:
    build: ./client
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres_data:
