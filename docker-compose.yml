services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signals
      POSTGRES_PASSWORD: signals
      POSTGRES_DB: signals
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signals -d signals"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://signals:signals@postgres:5432/signals
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build: ./client
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres_data:
